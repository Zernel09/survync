name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: launcher

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: launcher

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build executable
        run: python -m PyInstaller survync.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Survync-Windows
          path: launcher/dist/Survync.exe
          retention-days: 30
          if-no-files-found: error
