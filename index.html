<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survync - Modpack Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: #16213e;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      color: #1b998b;
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .subtitle { color: #888; margin-bottom: 24px; }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #0f3460;
    }
    .info-label { color: #888; }
    .info-value { font-weight: 600; }
    .status {
      margin-top: 24px;
      padding: 12px;
      background: #0d1117;
      border-radius: 6px;
      text-align: center;
    }
    .status.loading { color: #888; }
    .status.ok { color: #1b998b; }
    .status.error { color: #e74c3c; }
    #release-notes {
      margin-top: 16px;
      padding: 12px;
      background: #0d1117;
      border-radius: 6px;
      display: none;
    }
    #release-notes h3 { color: #1b998b; margin-bottom: 8px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Survync</h1>
    <p class="subtitle">Modpack Update Server</p>

    <div id="status" class="status loading">Loading pack info...</div>

    <div id="info" style="display:none;">
      <div class="info-row">
        <span class="info-label">Pack</span>
        <span class="info-value" id="pack-name">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Version</span>
        <span class="info-value" id="pack-version">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Minecraft</span>
        <span class="info-value" id="mc-version">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Loader</span>
        <span class="info-value" id="loader">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Last Updated</span>
        <span class="info-value" id="updated-at">—</span>
      </div>
    </div>

    <div id="release-notes">
      <h3>Release Notes</h3>
      <p id="notes-text"></p>
    </div>
  </div>

  <script>
    fetch('version.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('status').className = 'status ok';
        document.getElementById('status').textContent = 'Pack is online';
        document.getElementById('info').style.display = 'block';
        document.getElementById('pack-name').textContent = data.pack_name || '—';
        document.getElementById('pack-version').textContent = data.pack_version || '—';
        document.getElementById('mc-version').textContent = data.minecraft_version || '—';
        document.getElementById('loader').textContent =
          (data.loader_name || '') + ' ' + (data.loader_version || '');
        if (data.generated_at) {
          const d = new Date(data.generated_at);
          document.getElementById('updated-at').textContent = d.toLocaleDateString();
        }
        if (data.release_notes) {
          document.getElementById('release-notes').style.display = 'block';
          document.getElementById('notes-text').textContent = data.release_notes;
        }
      })
      .catch(() => {
        document.getElementById('status').className = 'status error';
        document.getElementById('status').textContent = 'Could not load pack info';
      });
  </script>
</body>
</html>
